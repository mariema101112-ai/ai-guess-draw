<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>免注册真AI你画我猜</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;touch-action:none;user-select:none;}
body{background:#f5f7fa;padding:10px;font-family:"Microsoft YaHei",Arial;}
.box{max-width:500px;margin:0 auto;background:#fff;border-radius:16px;padding:15px;box-shadow:0 2px 8px rgba(0,0,0,0.1);}
h2{text-align:center;margin-bottom:15px;color:#333;font-size:24px;}
.topic{font-size:22px;text-align:center;color:#e64340;font-weight:bold;margin:10px 0;}
#canvas{width:100%;aspect-ratio:1/1;border:2px solid #333;border-radius:12px;background:#fff;}
.btns{display:flex;gap:8px;margin:15px 0;}
.btn{flex:1;padding:14px 0;border:none;border-radius:10px;font-size:16px;color:#fff;cursor:pointer;}
.btn1{background:#f44336;}
.btn2{background:#2196F3;}
.btn3{background:#4CAF50;}
.res{padding:15px;background:#f0f7ff;border-radius:12px;text-align:center;font-size:17px;line-height:1.8;color:#333;}
</style>
</head>
<body>
<div class="box">
  <h2>🎨 免注册真AI你画我猜</h2>
  <div class="topic">题目：<span id="tt">加载中</span></div>
  <canvas id="cv"></canvas>
  <div class="btns">
    <button class="btn btn1" onclick="clearCv()">清空</button>
    <button class="btn btn2" onclick="aiGuess()">AI识别</button>
    <button class="btn btn3" onclick="nextTopic()">下一题</button>
  </div>
  <div class="res" id="result">准备就绪，开始画画吧～</div>
</div>

<script>
// 题库（和QuickDraw类别匹配）
const topics = [
  "飞机","苹果","香蕉","篮球","自行车","鸟","书","杯子","汽车","椅子",
  "时钟","衣服","电脑","杯子","鱼","眼镜","花","房子","钥匙","叶子",
  "摩托车","鼠标","笔","铅笔","电话","枕头","披萨","兔子","彩虹","船",
  "鞋子","沙发","星星","桌子","电视","树","雨伞","瓶子"
];

let currentTopic = "";
let isDrawing = false;
const canvas = document.getElementById("cv");
const ctx = canvas.getContext("2d");

// 画布初始化
function initCanvas() {
  const w = canvas.parentElement.clientWidth - 30;
  canvas.width = w;
  canvas.height = w;
  ctx.lineWidth = 8;
  ctx.lineCap = "round";
  ctx.lineJoin = "round";
  ctx.fillStyle = "#fff";
  ctx.fillRect(0, 0, canvas.width, canvas.height);
}

// 随机出题
function nextTopic() {
  currentTopic = topics[Math.floor(Math.random() * topics.length)];
  document.getElementById("tt").innerText = currentTopic;
  document.getElementById("result").innerText = "准备就绪，开始画画吧～";
  clearCv();
}

// 清空画布
function clearCv() {
  ctx.fillStyle = "#fff";
  ctx.fillRect(0, 0, canvas.width, canvas.height);
}

// 绘图事件
canvas.addEventListener("mousedown", startDraw);
canvas.addEventListener("mousemove", draw);
canvas.addEventListener("mouseup", stopDraw);
canvas.addEventListener("mouseleave", stopDraw);
canvas.addEventListener("touchstart", startDraw);
canvas.addEventListener("touchmove", draw);
canvas.addEventListener("touchend", stopDraw);

function startDraw(e) {
  e.preventDefault();
  isDrawing = true;
  const pos = getPosition(e);
  ctx.beginPath();
  ctx.moveTo(pos.x, pos.y);
}

function draw(e) {
  if (!isDrawing) return;
  e.preventDefault();
  const pos = getPosition(e);
  ctx.lineTo(pos.x, pos.y);
  ctx.stroke();
}

function stopDraw() {
  isDrawing = false;
}

function getPosition(e) {
  const rect = canvas.getBoundingClientRect();
  let x, y;
  if (e.touches) {
    x = e.touches[0].clientX - rect.left;
    y = e.touches[0].clientY - rect.top;
  } else {
    x = e.clientX - rect.left;
    y = e.clientY - rect.top;
  }
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  return { x: x * scaleX, y: y * scaleY };
}

// ✅ 核心：免注册真AI（QuickDraw公共接口）
async function aiGuess() {
  const canvasData = canvas.toDataURL("image/png");
  if (canvasData.length < 10000) {
    document.getElementById("result").innerText = "😜 还没画画呢，先画几笔吧～";
    return;
  }

  document.getElementById("result").innerText = "AI正在识别涂鸦...";

  try {
    // 转为base64（不带前缀）
    const base64 = canvasData.split(",")[1];

    // 调用公共QuickDraw识别接口（免注册、免密钥）
    const res = await fetch("https://quickdraw-api.vercel.app/api/recognize", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ image: base64 })
    });

    const data = await res.json();
    const topGuess = data.guesses?.[0]?.label || "未知";
    const confidence = (data.guesses?.[0]?.confidence * 100).toFixed(1) || 0;

    // 匹配题库
    const isCorrect = topGuess === currentTopic;
    let resultText = `AI识别：${topGuess}（${confidence}%）\n`;
    resultText += isCorrect ? "✅ 猜对啦！" : "❌ 没猜对～";

    document.getElementById("result").innerText = resultText;

  } catch (err) {
    console.error(err);
    document.getElementById("result").innerText = "⚠️ AI识别失败，请稍后再试";
  }
}

// 初始化
window.onload = function () {
  initCanvas();
  nextTopic();
};
window.onresize = initCanvas;
</script>
</body>
</html>
