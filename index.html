<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>真AI你画我猜 平板版</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;touch-action:none;user-select:none;}
body{background:#f5f7fa;padding:10px;}
.box{max-width:500px;margin:0 auto;background:#fff;border-radius:16px;padding:15px;}
h2{text-align:center;margin-bottom:10px;color:#333;}
.topic{font-size:22px;text-align:center;color:#e64340;font-weight:bold;margin:10px 0;}
#canvas{width:100%;aspect-ratio:1/1;border:2px solid #333;border-radius:12px;background:#fff;}
.btns{display:flex;gap:8px;margin:15px 0;}
.btn{flex:1;padding:14px 0;border:none;border-radius:10px;font-size:16px;color:#fff;}
.btn1{background:#f44336;}
.btn2{background:#2196F3;}
.btn3{background:#4CAF50;}
.res{padding:15px;background:#f0f7ff;border-radius:12px;text-align:center;font-size:17px;line-height:1.6;}
</style>
</head>
<body>
<div class="box">
  <h2>🎨 真AI你画我猜</h2>
  <div class="topic">题目：<span id="tt">加载中</span></div>
  <canvas id="cv"></canvas>
  <div class="btns">
    <button class="btn btn1" onclick="clearCv()">清空</button>
    <button class="btn btn2" onclick="aiGo()">AI识别</button>
    <button class="btn btn3" onclick="nextOne()">下一题</button>
  </div>
  <div class="res" id="res">准备就绪</div>
</div>

<script>
const words = ["床","沙发","桌子","椅子","衣柜","牙刷","手机","剪刀","雨伞","眼镜","钟表","书包","篮球","行李箱","帽子","水杯","钥匙","台灯","棉签","保温杯","充电宝","订书机","自拍杆","眼罩","卷发棒","体重秤","刀","杯","衣架","鼠标","毛巾","碗","勺子","梳子","铅笔","尺子","橡皮擦"];
const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');
let curWord = '';
let drawFlag = false;

// 适配平板画布
function resizeCv(){const w = cv.clientWidth;cv.width=w;cv.height=w;ctx.lineWidth=7;ctx.lineCap='round';ctx.lineJoin='round';}
window.onload=resizeCv;window.onresize=resizeCv;

// 随机出题
function nextOne(){curWord=words[Math.floor(Math.random()*words.length)];document.getElementById('tt').innerText=curWord;document.getElementById('res').innerText='开始画画吧';clearCv();}

// 触摸画画
cv.addEventListener('touchstart',start);
cv.addEventListener('touchmove',move);
cv.addEventListener('touchend',end);
function start(e){e.preventDefault();drawFlag=true;const r=cv.getBoundingClientRect();const x=e.touches[0].clientX-r.left;const y=e.touches[0].clientY-r.top;ctx.beginPath();ctx.moveTo(x,y);}
function move(e){if(!drawFlag)return;e.preventDefault();const r=cv.getBoundingClientRect();const x=e.touches[0].clientX-r.left;const y=e.touches[0].clientY-r.top;ctx.lineTo(x,y);ctx.stroke();}
function end(){drawFlag=false;}
function clearCv(){ctx.clearRect(0,0,cv.width,cv.height);}

// 对接Vercel后端
async function aiGo(){
  document.getElementById('res').innerText='AI正在认真识图...';
  const base64 = cv.toDataURL('image/png');
  try{
    const d = await fetch('/api/recognize',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({image:base64,target:curWord})
    });
    const res = await d.json();
    let txt = `AI识别：${res.guess}\n相似度：${res.similar}分\n`;
    txt += res.correct ? '✅ 猜对啦！画得很像' : '❌ 没猜对，再练练～';
    document.getElementById('res').innerText = txt;
  }catch(err){
    document.getElementById('res').innerText='识别失败，稍后再试';
  }
}
nextOne();
</script>
</body>
</html>
