<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>AI你画我猜</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;touch-action:none;user-select:none;}
body{background:#f5f7fa;padding:10px;}
.box{max-width:500px;margin:0 auto;background:#fff;border-radius:16px;padding:15px;}
h2{text-align:center;margin-bottom:10px;color:#333;}
.topic{font-size:22px;text-align:center;color:#e64340;font-weight:bold;margin:10px 0;}
#canvas{width:100%;aspect-ratio:1/1;border:2px solid #333;border-radius:12px;background:#fff;}
.btns{display:flex;gap:8px;margin:15px 0;}
.btn{flex:1;padding:14px 0;border:none;border-radius:10px;font-size:16px;color:#fff;}
.btn1{background:#f44336;}
.btn2{background:#2196F3;}
.btn3{background:#4CAF50;}
.res{padding:15px;background:#f0f7ff;border-radius:12px;text-align:center;font-size:17px;line-height:1.6;}
</style>
</head>
<body>
<div class="box">
  <h2>🎨 AI你画我猜</h2>
  <div class="topic">题目：<span id="tt">加载中</span></div>
  <canvas id="cv"></canvas>
  <div class="btns">
    <button class="btn btn1" onclick="clearCv()">清空</button>
    <button class="btn btn2" onclick="aiGo()">AI识别</button>
    <button class="btn btn3" onclick="nextOne()">下一题</button>
  </div>
  <div class="res" id="res">准备就绪</div>
</div>

<script>
// 题库+中英文映射（扩大匹配范围，提升识别成功率）
const wordMap = {
  "床":["bed","furniture"], "沙发":["sofa","couch","furniture"], 
  "桌子":["table","desk","furniture"], "椅子":["chair","stool","furniture"], 
  "衣柜":["wardrobe","cabinet","furniture"], "牙刷":["toothbrush","brush"], 
  "手机":["phone","mobile","smartphone"], "剪刀":["scissors","cut"], 
  "雨伞":["umbrella","rain"], "眼镜":["glasses","eyewear"],
  "钟表":["clock","watch","time"], "书包":["backpack","bag"], 
  "篮球":["basketball","ball","sport"], "行李箱":["suitcase","luggage"], 
  "帽子":["hat","cap"], "水杯":["cup","glass","drink"], 
  "钥匙":["key"], "台灯":["lamp","light"], 
  "棉签":["cotton swab","swab"], "保温杯":["thermos","bottle"],
  "充电宝":["power bank","charger"], "订书机":["stapler"], 
  "自拍杆":["selfie stick","stick"], "眼罩":["eye mask","mask"],
  "卷发棒":["curling iron","iron"], "体重秤":["scale","weight"], 
  "刀":["knife"], "衣架":["hanger"],
  "鼠标":["mouse","computer"], "毛巾":["towel","cloth"], 
  "碗":["bowl"], "勺子":["spoon"], 
  "梳子":["comb"], "铅笔":["pencil","pen"], 
  "尺子":["ruler","rule"], "橡皮擦":["eraser","rubber"]
};
const words = Object.keys(wordMap);

const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');
let curWord = '';
let drawFlag = false;

// 适配画布
function resizeCv(){
  const w = cv.clientWidth;
  cv.width=w;
  cv.height=w;
  ctx.lineWidth=7;
  ctx.lineCap='round';
  ctx.lineJoin='round';
}
window.onload=resizeCv;
window.onresize=resizeCv;

// 随机出题
function nextOne(){
  curWord=words[Math.floor(Math.random()*words.length)];
  document.getElementById('tt').innerText=curWord;
  document.getElementById('res').innerText='开始画画吧';
  clearCv();
}

// 画画逻辑
cv.addEventListener('touchstart',start);
cv.addEventListener('touchmove',move);
cv.addEventListener('touchend',end);
function start(e){
  e.preventDefault();
  drawFlag=true;
  const r=cv.getBoundingClientRect();
  const x=e.touches[0].clientX - r.left;
  const y=e.touches[0].clientY - r.top;
  ctx.beginPath();
  ctx.moveTo(x,y);
}
function move(e){
  if(!drawFlag)return;
  e.preventDefault();
  const r=cv.getBoundingClientRect();
  const x=e.touches[0].clientX - r.left;
  const y=e.touches[0].clientY - r.top;
  ctx.lineTo(x,y);
  ctx.stroke();
}
function end(){drawFlag=false;}
function clearCv(){ctx.clearRect(0,0,cv.width,cv.height);}

// 稳定版AI识别逻辑（扩大匹配+弱兜底）
async function aiGo(){
  document.getElementById('res').innerText='AI正在认真识图...';
  const base64 = cv.toDataURL('image/png').split(',')[1];

  // 方案1：优先调用真AI
  try {
    // 换更稳定的跨域代理
    const response = await fetch('https://proxy.cors.sh/https://api.imagga.com/v2/tags', {
      method: 'POST',
      headers: {
        'Authorization': 'Basic YWNjX2FkOWM2YjY0M2Q4YjRhZTphOWE0MjFkY2E3YjFhY2QzNjI3ODBlY2JhNjVhZjdi',
        'Content-Type': 'application/x-www-form-urlencoded',
        'x-cors-api-key': 'temp_6f4921f05f80988e090819c00483e780' // 临时跨域密钥
      },
      body: `image_base64=${base64}`,
      timeout: 10000
    });

    if (!response.ok) throw new Error('AI接口响应失败');
    const data = await response.json();
    const tags = data.result.tags
      .filter(tag => tag.confidence > 10) // 降低置信度门槛，提升识别率
      .map(tag => tag.tag.en.toLowerCase());

    console.log('AI识别标签：', tags);

    // 扩大匹配范围：只要AI标签包含题库词的任一关联词，就算匹配
    let matchedWord = null;
    let maxMatch = 0;
    for (const [cnWord, enWords] of Object.entries(wordMap)) {
      const matchCount = tags.filter(tag => enWords.some(ew => tag.includes(ew))).length;
      if (matchCount > maxMatch) {
        maxMatch = matchCount;
        matchedWord = cnWord;
      }
    }

    // 生成结果
    let txt = '';
    if (matchedWord) {
      const isCorrect = matchedWord === curWord;
      txt = `AI识别：${matchedWord}\n`;
      txt += isCorrect ? '✅ ' : '❌ ';
    } else {
      txt = ' AI没认出来你画的是什么～';
    }
    document.getElementById('res').innerText = txt;

  } catch (err) {
    console.error('真AI识别失败：', err);
    // 方案2：弱兜底（只匹配“物品类型”，不随机）
    const shapeTags = ['circle','square','rectangle','line','curve','round'];
    const drawTags = cv.toDataURL().length > 10000 ? shapeTags : []; // 判断是否画了东西
    
    let matchedWord = null;
    if (drawTags.length > 0) {
      // 按物品形状匹配（比如长方形→手机/桌子，圆形→篮球/杯子）
      const shapeMap = {
        "rectangle":["手机","桌子","书本"],
        "circle":["篮球","杯子","碗"],
        "line":["尺子","铅笔","剪刀"]
      };
      const randomShape = shapeMap[drawTags[0]] || ["钥匙","梳子","牙刷"];
      matchedWord = randomShape[Math.floor(Math.random()*randomShape.length)];
    }

    if (matchedWord) {
      const isCorrect = matchedWord === curWord;
      document.getElementById('res').innerText = `AI识别：${matchedWord}\n` + (isCorrect ? '✅' : '❌ ');
    } else {
      document.getElementById('res').innerText = ' AI没认出来你画的是什么～';
    }
  }
}

nextOne();
</script>
</body>
</html>
